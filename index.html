<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Iniciar sesión</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="login-page">
      <div class="login-box">
        <h1 class="login-title">📦 Rastreo de Paquetes</h1>
        <p class="login-subtitle">Iniciá sesión para ver tus paquetes</p>

        <div class="form-group">
          <label for="username">Usuario</label>
          <input type="text" id="username" placeholder="Tu usuario" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input type="password" id="password" placeholder="••••••••" />
        </div>

        <button id="loginBtn" onclick="doLogin()" class="btn-primary login-btn">Ingresar</button>
        <p id="loginError" class="error-msg hidden"></p>

        <div class="login-links">
          <a href="#" class="login-link" onclick="forgotPassword(event)">¿Olvidaste tu contraseña?</a>
          <a href="rastreo.html" class="login-link guest-link">Continuar como invitado</a>
        </div>
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="demo-data.js"></script>
    <script src="app.js"></script>
    <script>
      // ---- Theme ----
      (function() {
        const saved = localStorage.getItem("rastreo_theme");
        if (saved === "light") document.documentElement.setAttribute("data-theme", "light");
      })();

      // If already logged in, redirect
      if (App.isLoggedIn()) {
        const user = App.getUser();
        if (user.role === "admin") {
          window.location.href = "admin.html";
        } else {
          window.location.href = "rastreo.html";
        }
      }

      async function doLogin() {
        const username = document.getElementById("username").value.trim();
        const password = document.getElementById("password").value;
        const errorEl = document.getElementById("loginError");
        errorEl.classList.add("hidden");

        if (!username || !password) {
          errorEl.textContent = "Por favor ingresá usuario y contraseña.";
          errorEl.classList.remove("hidden");
          return;
        }

        const result = await App.login(username, password);
        if (result.success) {
          if (result.role === "admin") {
            window.location.href = "admin.html";
          } else {
            window.location.href = "rastreo.html";
          }
        } else {
          errorEl.textContent = result.error;
          errorEl.classList.remove("hidden");
        }
      }

      function forgotPassword(e) {
        e.preventDefault();
        alert("Por favor contactá al administrador para restablecer tu contraseña.");
      }

      // Enter key on password
      document.getElementById("password").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
      document.getElementById("username").addEventListener("keydown", (e) => {
        if (e.key === "Enter") doLogin();
      });
    </script>
  </body>
</html>
