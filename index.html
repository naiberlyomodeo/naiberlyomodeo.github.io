<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rastreo de Paquetes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="top-nav">
      <a href="index.html" class="active">Rastreo</a>
      <a href="catalogo.html">Catálogo</a>
    </nav>

    <div class="container">
      <header>
        <h1>Rastreo de Paquetes</h1>
        <p class="subtitle">Consultá el estado de tus paquetes</p>
      </header>

      <main>
        <section class="search-section">
          <div class="search-box">
            <label for="searchInput">Ingresá tu cédula o número de rastreo</label>
            <div class="search-row">
              <input
                type="text"
                id="searchInput"
                placeholder="Ej: 123456789 o TRK-0001"
                autocomplete="off"
              />
              <button id="searchBtn" onclick="searchPackages()">Buscar</button>
            </div>
          </div>
        </section>

        <section id="results" class="results-section hidden">
          <h2 id="resultsTitle"></h2>
          <div id="packageList"></div>
        </section>

        <section id="noResults" class="no-results hidden">
          <p>No se encontraron paquetes. Verificá tu cédula o número de rastreo.</p>
        </section>
      </main>

      <footer>
        <a href="admin.html" class="admin-link">Administración</a>
      </footer>
    </div>

    <script src="firebase-config.js"></script>
    <script src="app.js"></script>
    <script>
      async function searchPackages() {
        const query = document.getElementById("searchInput").value.trim();
        if (!query) return;

        const results = document.getElementById("results");
        const noResults = document.getElementById("noResults");
        const packageList = document.getElementById("packageList");
        const resultsTitle = document.getElementById("resultsTitle");

        results.classList.add("hidden");
        noResults.classList.add("hidden");
        packageList.innerHTML = '<p class="loading">Buscando...</p>';

        const packages = await App.searchPackages(query);

        if (packages.length === 0) {
          noResults.classList.remove("hidden");
          return;
        }

        resultsTitle.textContent = `Paquetes encontrados: ${packages.length}`;
        packageList.innerHTML = packages.map(pkg => renderPackageCard(pkg)).join("");
        results.classList.remove("hidden");
      }

      function renderPackageCard(pkg) {
        const stages = App.STAGES;
        const currentIndex = stages.indexOf(pkg.status);

        const stepsHtml = stages
          .map((stage, i) => {
            let cls = "step";
            if (i < currentIndex) cls += " completed";
            else if (i === currentIndex) cls += " active";
            return `<div class="${cls}">
              <div class="step-dot"></div>
              <span class="step-label">${stage}</span>
            </div>`;
          })
          .join("");

        return `
          <div class="package-card">
            <div class="card-header">
              <span class="tracking-number">${pkg.trackingNumber}</span>
              <span class="status-badge status-${currentIndex}">${pkg.status}</span>
            </div>
            <p class="card-description">${pkg.description}</p>
            <div class="progress-bar">
              ${stepsHtml}
            </div>
            ${pkg.notes ? `<p class="card-notes">📝 ${pkg.notes}</p>` : ""}
          </div>
        `;
      }

      // Allow Enter key to search
      document.getElementById("searchInput").addEventListener("keydown", (e) => {
        if (e.key === "Enter") searchPackages();
      });
    </script>
  </body>
</html>
