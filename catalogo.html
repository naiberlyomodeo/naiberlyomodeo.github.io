<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Catálogo de Productos</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="top-nav" id="topNav" aria-label="Navegación principal">
      <a href="rastreo.html">Rastreo</a>
      <a href="rastreo.html#entregados" id="topEntregadosLink" class="hidden">Entregados</a>
      <a href="catalogo.html" class="active">Catálogo</a>
      <span id="navRight" class="nav-right">
        <span id="navUser" class="nav-user"></span>
        <button class="nav-icon-btn" id="navThemeBtn" onclick="toggleThemeDesktop()" title="Cambiar tema">
          <svg id="navThemeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <a href="#" id="navLogout" class="nav-logout hidden" onclick="doLogout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión</a>
        <a href="index.html" id="navLogin" class="nav-logout hidden"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/></svg> Iniciar sesión</a>
      </span>
    </nav>

    <div class="container has-bottom-nav">
      <header>
        <h1>Catálogo de Productos</h1>
        <p class="subtitle">Explorá los productos disponibles</p>
      </header>

      <main>
        <!-- Filters & View Toggle -->
        <section class="catalog-toolbar">
          <div class="search-row">
            <input
              type="text"
              id="catalogSearch"
              placeholder="Buscar por nombre o código..."
              oninput="filterCatalog()"
            />
            <div class="view-toggle" role="group" aria-label="Cambiar vista">
              <button id="gridBtn" class="view-btn active" onclick="setView('grid')" title="Vista cuadrícula" aria-label="Vista cuadrícula" aria-pressed="true">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
                  <rect x="0" y="0" width="8" height="8" rx="1"/>
                  <rect x="10" y="0" width="8" height="8" rx="1"/>
                  <rect x="0" y="10" width="8" height="8" rx="1"/>
                  <rect x="10" y="10" width="8" height="8" rx="1"/>
                </svg>
              </button>
              <button id="listBtn" class="view-btn" onclick="setView('list')" title="Vista lista" aria-label="Vista lista" aria-pressed="false">
                <svg width="18" height="18" viewBox="0 0 18 18" fill="currentColor" aria-hidden="true">
                  <rect x="0" y="1" width="18" height="4" rx="1"/>
                  <rect x="0" y="7" width="18" height="4" rx="1"/>
                  <rect x="0" y="13" width="18" height="4" rx="1"/>
                </svg>
              </button>
            </div>
          </div>
        </section>

        <!-- Product Count -->
        <p id="productCount" class="product-count"></p>

        <!-- Products Grid/List -->
        <section id="productContainer" class="product-grid"></section>

        <section id="noProducts" class="no-results hidden">
          <p>No se encontraron productos.</p>
        </section>
      </main>

      <footer></footer>
    </div>

    <!-- Product Detail Modal -->
    <div id="productDetail" class="detail-overlay hidden" role="dialog" aria-modal="true" aria-label="Detalle del producto" onclick="if(event.target===this)closeDetail()">
      <div class="detail-box">
        <button class="detail-close" onclick="closeDetail()" aria-label="Cerrar">&times;</button>
        <div id="detailContent"></div>
      </div>
    </div>

    <!-- Bottom Navigation (mobile) -->
    <nav class="bottom-nav" id="bottomNav" aria-label="Navegación principal">
      <a href="rastreo.html" class="bottom-nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span>Rastreo</span>
      </a>
      <a href="rastreo.html#entregados" class="bottom-nav-item hidden" id="entregadosNavItem">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>
        <span>Entregados</span>
      </a>
      <a href="catalogo.html" class="bottom-nav-item active" id="catalogoNavItem">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span>Catálogo</span>
      </a>
      <a href="#" class="bottom-nav-item" id="settingsNavItem" onclick="toggleSettings(); return false;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Ajustes</span>
      </a>
      <a href="#" class="bottom-nav-item" id="bottomAuthLink" onclick="doLogout()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="bottomAuthIcon"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span id="bottomAuthLabel">Salir</span>
      </a>
    </nav>

    <!-- Settings Modal -->
    <div id="settingsModal" class="settings-overlay hidden" role="dialog" aria-modal="true" aria-label="Ajustes" onclick="if(event.target===this)closeSettings()">
      <div class="settings-sheet">
        <h3>Ajustes</h3>
        <div class="theme-toggle-row">
          <span>Modo claro</span>
          <label class="theme-switch">
            <input type="checkbox" id="themeToggle" onchange="toggleTheme(this.checked)">
            <span class="theme-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="demo-data.js"></script>
    <script src="app.js"></script>
    <script>
      // Show user info in nav for all users
      const user = App.getUser();
      if (user) {
        const suffix = user.role === "admin" ? " (Admin)" : "";
        document.getElementById("navUser").textContent = user.name + suffix;
        document.getElementById("navLogout").classList.remove("hidden");
      } else {
        document.getElementById("navUser").textContent = "Invitado";
        document.getElementById("navLogin").classList.remove("hidden");
        // Bottom nav: switch to login link for guests
        const authLink = document.getElementById("bottomAuthLink");
        authLink.href = "index.html";
        authLink.onclick = null;
        document.getElementById("bottomAuthLabel").textContent = "Ingresar";
        document.getElementById("bottomAuthIcon").innerHTML = '<path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>';
      }

      // Show Entregados tab for logged-in clients (desktop + mobile)
      if (user && user.role === "client") {
        document.getElementById("topEntregadosLink").classList.remove("hidden");
        document.getElementById("entregadosNavItem").classList.remove("hidden");
      }

      function doLogout() {
        App.logout();
        window.location.href = "index.html";
      }

      // ---- Theme ----
      function isLightMode() {
        return document.documentElement.getAttribute("data-theme") === "light";
      }
      function initTheme() {
        const saved = localStorage.getItem("rastreo_theme");
        if (saved === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          const tog = document.getElementById("themeToggle");
          if (tog) tog.checked = true;
        }
        updateThemeIcon();
      }
      function applyTheme(light) {
        if (light) {
          document.documentElement.setAttribute("data-theme", "light");
          localStorage.setItem("rastreo_theme", "light");
        } else {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("rastreo_theme", "dark");
        }
        updateThemeIcon();
      }
      function toggleTheme(isLight) { applyTheme(isLight); }
      function toggleThemeDesktop() {
        const goLight = !isLightMode();
        applyTheme(goLight);
        const tog = document.getElementById("themeToggle");
        if (tog) tog.checked = goLight;
      }
      function updateThemeIcon() {
        const icon = document.getElementById("navThemeIcon");
        if (!icon) return;
        if (isLightMode()) {
          icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        } else {
          icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
        }
      }
      function toggleSettings() {
        const modal = document.getElementById("settingsModal");
        const item = document.getElementById("settingsNavItem");
        const items = document.querySelectorAll("#bottomNav .bottom-nav-item");
        if (modal.classList.contains("hidden")) {
          items.forEach(i => { if (i !== item) i.classList.remove("active"); });
          modal.classList.remove("hidden");
          item.classList.add("active");
        } else {
          modal.classList.add("hidden");
          item.classList.remove("active");
          document.getElementById("catalogoNavItem").classList.add("active");
        }
      }
      function closeSettings() {
        document.getElementById("settingsModal").classList.add("hidden");
        document.getElementById("settingsNavItem").classList.remove("active");
        document.getElementById("catalogoNavItem").classList.add("active");
      }
      initTheme();

      let allProducts = [];
      let currentView = "grid";

      async function loadCatalog() {
        allProducts = await App.getAllProducts();
        filterCatalog();
      }

      function filterCatalog() {
        const query = document.getElementById("catalogSearch").value.toLowerCase().trim();

        let filtered = allProducts;

        if (query) {
          filtered = filtered.filter(p =>
            p.name.toLowerCase().includes(query) ||
            (p.productCode && p.productCode.toLowerCase().includes(query)) ||
            (p.notes && p.notes.toLowerCase().includes(query))
          );
        }

        renderProducts(filtered);
      }

      function renderProducts(products) {
        const container = document.getElementById("productContainer");
        const noProducts = document.getElementById("noProducts");
        const countEl = document.getElementById("productCount");

        countEl.textContent = `${products.length} producto${products.length !== 1 ? "s" : ""}`;

        if (products.length === 0) {
          container.innerHTML = "";
          noProducts.classList.remove("hidden");
          return;
        }

        noProducts.classList.add("hidden");

        container.className = currentView === "grid" ? "product-grid" : "product-list";

        container.innerHTML = products.map(p => {
          const placeholderSvg = `<div class="product-img product-img-placeholder"><svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`;
          const imgHtml = p.image
            ? `<div class="product-img"><img src="${p.image}" alt="${p.name}" loading="lazy" /></div>`
            : placeholderSvg;

          const currSymbol = p.currency === "USD" ? "$" : "₡";
          const priceHtml = p.price
            ? `<span class="product-price">${currSymbol}${Number(p.price).toLocaleString("es-CR")}</span>`
            : "";

          return `
            <div class="product-card" onclick="openDetail('${p.id}')" style="cursor:pointer">
              ${imgHtml}
              <div class="product-info">
                <div class="product-header">
                  <h3 class="product-name">${p.name}</h3>
                  ${priceHtml}
                </div>
                ${p.notes ? `<p class="product-notes">${p.notes}</p>` : ""}
                <div class="product-meta-bottom">
                  ${p.location ? `<span class="product-bodega">Bodega: ${p.location}</span>` : ""}
                  ${p.productCode ? `<span class="product-code">${p.productCode}</span>` : ""}
                </div>
              </div>
            </div>
          `;
        }).join("");
      }

      function openDetail(id) {
        const p = allProducts.find(x => x.id === id);
        if (!p) return;

        const currSymbol = p.currency === "USD" ? "$" : "₡";
        const imgHtml = p.image
          ? `<img src="${p.image}" alt="${p.name}" class="detail-image" />`
          : `<div class="detail-image-placeholder"><svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg></div>`;

        document.getElementById("detailContent").innerHTML = `
          ${imgHtml}
          <div class="detail-info">
            ${p.productCode ? `<span class="product-code">${p.productCode}</span>` : ""}
            <h2 class="detail-name">${p.name}</h2>
            ${p.price ? `<p class="detail-price">${currSymbol}${Number(p.price).toLocaleString("es-CR")}</p>` : ""}
            ${p.location ? `<p class="detail-meta"><span class="product-bodega">Bodega: ${p.location}</span></p>` : ""}
            ${p.notes ? `<p class="detail-notes">${p.notes}</p>` : ""}
          </div>
        `;

        document.getElementById("productDetail").classList.remove("hidden");
        document.body.style.overflow = "hidden";
      }

      function closeDetail() {
        document.getElementById("productDetail").classList.add("hidden");
        document.body.style.overflow = "";
      }

      // Close modals on Escape
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeDetail();
          closeSettings();
        }
      });

      function setView(view) {
        currentView = view;
        document.getElementById("gridBtn").classList.toggle("active", view === "grid");
        document.getElementById("listBtn").classList.toggle("active", view === "list");
        document.getElementById("gridBtn").setAttribute("aria-pressed", view === "grid");
        document.getElementById("listBtn").setAttribute("aria-pressed", view === "list");
        filterCatalog();
      }

      loadCatalog();
    </script>
  </body>
</html>
