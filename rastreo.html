<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Rastreo de Paquetes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="top-nav" id="topNav">
      <a href="rastreo.html" class="active">Rastreo</a>
      <a href="catalogo.html">Catálogo</a>
      <span id="navRight" class="nav-right">
        <span id="navUser" class="nav-user"></span>
        <a href="#" id="navLogout" class="nav-logout hidden" onclick="doLogout()">Cerrar sesión</a>
        <a href="index.html" id="navLogin" class="nav-logout hidden">Iniciar sesión</a>
      </span>
    </nav>

    <div class="container has-bottom-nav">
      <header>
        <h1>Rastreo de Paquetes</h1>
        <p class="subtitle" id="pageSubtitle">Consultá el estado de tus paquetes</p>
      </header>

      <main>
        <!-- Search section (guests only) -->
        <section id="searchSection" class="search-section">
          <div class="search-box">
            <label for="searchInput">Ingresá tu número de rastreo</label>
            <input
              type="text"
              id="searchInput"
              placeholder="Ej: TRK-123456"
              autocomplete="off"
              oninput="debouncedSearch()"
            />
          </div>
        </section>

        <section id="results" class="results-section hidden">
          <h2 id="resultsTitle"></h2>
          <div id="packageList"></div>
        </section>

        <section id="noResults" class="no-results hidden">
          <p>No se encontraron paquetes. Verificá tu número de rastreo.</p>
        </section>

        <section id="noPacketsClient" class="no-results hidden">
          <p>No tenés paquetes registrados en este momento.</p>
        </section>
      </main>

      <footer></footer>
    </div>

    <!-- Bottom Navigation (mobile) -->
    <nav class="bottom-nav" id="bottomNav">
      <a href="index.html" class="bottom-nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
        <span>Inicio</span>
      </a>
      <a href="rastreo.html" class="bottom-nav-item active">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span>Rastreo</span>
      </a>
      <a href="catalogo.html" class="bottom-nav-item">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span>Catálogo</span>
      </a>
      <a href="#" class="bottom-nav-item" id="bottomAuthLink" onclick="doLogout()">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" id="bottomAuthIcon"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span id="bottomAuthLabel">Salir</span>
      </a>
    </nav>

    <script src="firebase-config.js"></script>
    <script src="demo-data.js"></script>
    <script src="app.js"></script>
    <script>
      const user = App.getUser();
      const isClient = user && user.role === "client";

      // Show user info in nav for all users
      if (user) {
        const suffix = user.role === "admin" ? " (Admin)" : "";
        document.getElementById("navUser").textContent = user.name + suffix;
        document.getElementById("navLogout").classList.remove("hidden");
      } else {
        document.getElementById("navUser").textContent = "Invitado";
        document.getElementById("navLogin").classList.remove("hidden");
        // Bottom nav: switch to login link for guests
        const authLink = document.getElementById("bottomAuthLink");
        authLink.href = "index.html";
        authLink.onclick = null;
        document.getElementById("bottomAuthLabel").textContent = "Ingresar";
        document.getElementById("bottomAuthIcon").innerHTML = '<path d="M15 3h4a2 2 0 012 2v14a2 2 0 01-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>';
      }

      // Client mode: auto-load packages, hide search
      if (isClient) {
        document.getElementById("searchSection").classList.add("hidden");
        const firstName = user.name.replace(/\s*\(.*\)/, "");
        document.getElementById("pageSubtitle").textContent = `Hola ${firstName}, estos son tus paquetes`;
        loadClientPackages();
      }

      async function loadClientPackages() {
        const packages = await App.searchPackages(user.cedula);
        const results = document.getElementById("results");
        const packageList = document.getElementById("packageList");
        const resultsTitle = document.getElementById("resultsTitle");
        const noPackets = document.getElementById("noPacketsClient");

        if (packages.length === 0) {
          noPackets.classList.remove("hidden");
          return;
        }

        resultsTitle.textContent = `Tus paquetes: ${packages.length}`;
        packageList.innerHTML = packages.map(pkg => renderPackageCard(pkg)).join("");
        results.classList.remove("hidden");
      }

      // Guest mode: debounced search
      let searchTimer = null;
      function debouncedSearch() {
        clearTimeout(searchTimer);
        searchTimer = setTimeout(searchPackages, 300);
      }

      async function searchPackages() {
        const query = document.getElementById("searchInput").value.trim();
        const results = document.getElementById("results");
        const noResults = document.getElementById("noResults");
        const packageList = document.getElementById("packageList");
        const resultsTitle = document.getElementById("resultsTitle");

        results.classList.add("hidden");
        noResults.classList.add("hidden");

        if (!query) return;

        packageList.innerHTML = '<p class="loading">Buscando...</p>';
        results.classList.remove("hidden");

        const packages = await App.searchByTracking(query);

        if (packages.length === 0) {
          results.classList.add("hidden");
          noResults.classList.remove("hidden");
          return;
        }

        resultsTitle.textContent = `Paquetes encontrados: ${packages.length}`;
        packageList.innerHTML = packages.map(pkg => renderPackageCard(pkg)).join("");
      }

      function renderPackageCard(pkg) {
        const stages = App.STAGES;
        const currentIndex = stages.indexOf(pkg.status);

        const stepsHtml = stages
          .map((stage, i) => {
            let cls = "step";
            if (i < currentIndex) cls += " completed";
            else if (i === currentIndex) cls += " active";
            return `<div class="${cls}">
              <div class="step-dot"></div>
              <span class="step-label">${stage}</span>
            </div>`;
          })
          .join("");

        return `
          <div class="package-card">
            <div class="card-header">
              <span class="tracking-number">${pkg.trackingNumber}</span>
              <span class="status-badge status-${currentIndex}">${pkg.status}</span>
            </div>
            <p class="card-description">${pkg.description}</p>
            <div class="progress-bar">
              ${stepsHtml}
            </div>
            ${pkg.statusUpdatedAt ? `<p class="card-date">Última actualización: ${new Date(pkg.statusUpdatedAt).toLocaleDateString("es-CR", { day: "2-digit", month: "short", year: "numeric" })}</p>` : ""}
            ${pkg.notes ? `<p class="card-notes">📝 ${pkg.notes}</p>` : ""}
          </div>
        `;
      }

      function doLogout() {
        App.logout();
        window.location.href = "index.html";
      }
    </script>
  </body>
</html>
