<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Admin - Rastreo de Paquetes</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <nav class="top-nav top-nav-right hidden" id="adminNav" aria-label="Navegación principal">
      <span class="nav-right">
        <span id="navUser" class="nav-user"></span>
        <button class="nav-icon-btn" id="navThemeBtn" onclick="toggleThemeDesktop()" title="Cambiar tema">
          <svg id="navThemeIcon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        </button>
        <a href="#" class="nav-logout" onclick="logout()"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Cerrar sesión</a>
      </span>
    </nav>

    <div class="container has-bottom-nav">
      <header>
        <h1>Administración</h1>
        <p class="subtitle">Gestioná paquetes, productos y clientes</p>
      </header>

      <!-- Admin Dashboard -->
      <section id="adminSection" class="hidden">

        <!-- Tab Navigation -->
        <div class="admin-tabs">
          <button class="tab-btn active" onclick="switchTab('packages')">📦 Paquetes</button>
          <button class="tab-btn" onclick="switchTab('catalog')">🛍️ Catálogo</button>
          <button class="tab-btn" onclick="switchTab('clients')">👥 Clientes</button>
        </div>

        <!-- ============================================ -->
        <!-- PACKAGES TAB                                 -->
        <!-- ============================================ -->
        <div id="tab-packages" class="tab-content">
          <div class="admin-toolbar">
            <button onclick="showAddPackageForm()" class="btn-primary">+ Nuevo paquete</button>
            <div class="search-row">
              <input
                type="text"
                id="adminSearch"
                placeholder="Buscar por cédula o rastreo..."
                oninput="filterPackages()"
              />
            </div>
          </div>

          <!-- Add/Edit Package Form -->
          <div id="packageForm" class="form-section hidden">
            <h3 id="pkgFormTitle">Nuevo paquete</h3>
            <input type="hidden" id="pkgEditId" />
            <div class="form-grid">
              <div class="form-group">
                <label for="clientName">Nombre del cliente <span class="required">*</span></label>
                <input type="text" id="clientName" placeholder="María López" oninput="checkPkgFields()" />
              </div>
              <div class="form-group">
                <label for="clientId">Cédula del cliente <span class="required">*</span></label>
                <input type="text" id="clientId" placeholder="123456789" oninput="checkPkgFields()" />
              </div>
              <div class="form-group">
                <label for="pkgDescription">Descripción del paquete <span class="required">*</span></label>
                <input type="text" id="pkgDescription" placeholder="Ej: Zapatos Nike, talla 10" oninput="checkPkgFields()" />
              </div>
              <div class="form-group">
                <label for="pkgStatus">Estado <span class="required">*</span></label>
                <select id="pkgStatus"></select>
              </div>
              <div class="form-group">
                <label for="pkgNotes">Notas (opcional)</label>
                <input type="text" id="pkgNotes" placeholder="Notas adicionales..." />
              </div>
            </div>
            <div class="form-actions">
              <button onclick="savePackage()" class="btn-primary" id="pkgSaveBtn" disabled>Guardar</button>
              <button onclick="hidePackageForm()" class="btn-secondary">Cancelar</button>
            </div>
          </div>

          <!-- Bulk Update -->
          <div id="bulkSection" class="hidden">
            <div class="bulk-bar">
              <label class="bulk-select-all">
                <input type="checkbox" id="selectAll" onchange="toggleSelectAll()" />
                Todos
              </label>
              <span id="bulkCount">0 seleccionados</span>
              <select id="bulkStatus"></select>
              <button onclick="bulkUpdate()" class="btn-primary">Actualizar</button>
              <button onclick="cancelBulk()" class="btn-secondary">Cancelar</button>
            </div>
          </div>

          <!-- Package Cards -->
          <div id="packageCards" class="admin-cards"></div>
        </div>

        <!-- ============================================ -->
        <!-- CATALOG TAB                                  -->
        <!-- ============================================ -->
        <div id="tab-catalog" class="tab-content hidden">
          <div class="admin-toolbar">
            <button onclick="showAddProductForm()" class="btn-primary">+ Nuevo producto</button>
            <div class="search-row">
              <input
                type="text"
                id="catalogAdminSearch"
                placeholder="Buscar producto..."
                oninput="filterProducts()"
              />
            </div>
          </div>

          <!-- Add/Edit Product Form -->
          <div id="productForm" class="form-section hidden">
            <h3 id="prodFormTitle">Nuevo producto</h3>
            <input type="hidden" id="prodEditId" />
            <div class="form-grid">
              <div class="form-group">
                <label for="prodName">Nombre del producto <span class="required">*</span></label>
                <input type="text" id="prodName" placeholder="Ej: Zapatos Nike Air Max" oninput="checkProdFields()" />
              </div>
              <div class="form-group">
                <label for="prodPrice">Precio <span class="required">*</span></label>
                <div class="price-row">
                  <select id="prodCurrency" class="currency-select">
                    <option value="CRC">CRC</option>
                    <option value="USD">USD</option>
                  </select>
                  <input type="number" id="prodPrice" placeholder="0.00" step="0.01" min="0" oninput="checkProdFields()" />
                </div>
              </div>
              <div class="form-group">
                <label for="prodLocation">Bodega <span class="required">*</span></label>
                <select id="prodLocation" onchange="checkProdFields()">
                  <option value="">Seleccionar...</option>
                  <option value="Casa">Casa</option>
                  <option value="Santa Ana">Santa Ana</option>
                </select>
              </div>
              <div class="form-group">
                <label for="prodNotes">Notas (opcional)</label>
                <input type="text" id="prodNotes" placeholder="Color, talla, detalles..." />
              </div>
              <div class="form-group form-group-full">
                <label for="prodImage">Imagen (opcional)</label>
                <input type="file" id="prodImage" accept="image/*" onchange="previewImage(event)" />
                <div id="imagePreview" class="image-preview hidden">
                  <img id="previewImg" src="" alt="Preview" />
                  <button onclick="clearImage()" class="btn-sm btn-danger">Quitar imagen</button>
                </div>
              </div>
            </div>
            <div class="form-actions">
              <button onclick="saveProduct()" class="btn-primary" id="prodSaveBtn" disabled>Guardar</button>
              <button onclick="hideProductForm()" class="btn-secondary">Cancelar</button>
            </div>
          </div>

          <!-- Product Cards -->
          <div id="productCards" class="admin-cards"></div>
        </div>

        <!-- ============================================ -->
        <!-- CLIENTS TAB                                  -->
        <!-- ============================================ -->
        <div id="tab-clients" class="tab-content hidden">
          <div class="admin-toolbar">
            <button onclick="showAddClientForm()" class="btn-primary">+ Nuevo cliente</button>
            <div class="search-row">
              <input
                type="text"
                id="clientAdminSearch"
                placeholder="Buscar por nombre, cédula o teléfono..."
                oninput="filterClients()"
              />
            </div>
          </div>

          <!-- Add/Edit Client Form -->
          <div id="clientForm" class="form-section hidden">
            <h3 id="clientFormTitle">Nuevo cliente</h3>
            <input type="hidden" id="clientEditId" />
            <div class="form-grid">
              <div class="form-group">
                <label for="cliName">Nombre completo <span class="required">*</span></label>
                <input type="text" id="cliName" placeholder="María López" oninput="checkClientFields()" />
              </div>
              <div class="form-group">
                <label for="cliCedula">Cédula <span class="required">*</span></label>
                <input type="text" id="cliCedula" placeholder="123456789" oninput="checkClientFields()" />
              </div>
              <div class="form-group">
                <label for="cliPhone">Teléfono <span class="required">*</span></label>
                <input type="text" id="cliPhone" placeholder="8888-8888" oninput="checkClientFields()" />
              </div>
              <div class="form-group">
                <label for="cliEmail">Correo electrónico (opcional)</label>
                <input type="email" id="cliEmail" placeholder="maria@ejemplo.com" />
              </div>
              <div class="form-group">
                <label for="cliAddress">Dirección (opcional)</label>
                <input type="text" id="cliAddress" placeholder="San José, Costa Rica" />
              </div>
              <div class="form-group">
                <label for="cliNotes">Notas (opcional)</label>
                <input type="text" id="cliNotes" placeholder="Notas sobre el cliente..." />
              </div>
            </div>
            <div class="form-actions">
              <button onclick="saveClient()" class="btn-primary" id="clientSaveBtn" disabled>Guardar</button>
              <button onclick="hideClientForm()" class="btn-secondary">Cancelar</button>
            </div>
          </div>

          <!-- Client Cards -->
          <div id="clientCards" class="admin-cards"></div>
        </div>

      </section>
    </div>

    <!-- Confirm Modal -->
    <div id="confirmModal" class="modal-overlay hidden" role="dialog" aria-modal="true" aria-labelledby="confirmMsg">
      <div class="modal-box">
        <p id="confirmMsg">¿Estás segura?</p>
        <div class="modal-actions">
          <button id="confirmYes" class="btn-primary btn-danger">Eliminar</button>
          <button id="confirmNo" class="btn-secondary" onclick="closeModal()">Cancelar</button>
        </div>
      </div>
    </div>

    <!-- FAB (mobile) -->
    <button class="fab" id="adminFab" onclick="fabAdd()" aria-label="Agregar nuevo">+</button>

    <!-- Bottom Navigation (mobile admin) -->
    <nav class="bottom-nav" id="adminBottomNav" aria-label="Navegación principal">
      <a href="#" class="bottom-nav-item active" onclick="switchTabBottom('packages', this); return false;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16z"/><polyline points="3.27 6.96 12 12.01 20.73 6.96"/><line x1="12" y1="22.08" x2="12" y2="12"/></svg>
        <span>Paquetes</span>
      </a>
      <a href="#" class="bottom-nav-item" onclick="switchTabBottom('catalog', this); return false;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z"/><line x1="3" y1="6" x2="21" y2="6"/><path d="M16 10a4 4 0 01-8 0"/></svg>
        <span>Catálogo</span>
      </a>
      <a href="#" class="bottom-nav-item" onclick="switchTabBottom('clients', this); return false;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        <span>Clientes</span>
      </a>
      <a href="#" class="bottom-nav-item" id="adminSettingsNavItem" onclick="toggleSettings(); return false;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
        <span>Ajustes</span>
      </a>
      <a href="#" class="bottom-nav-item" onclick="logout(); return false;">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
        <span>Salir</span>
      </a>
    </nav>

    <!-- Settings Modal -->
    <div id="settingsModal" class="settings-overlay hidden" role="dialog" aria-modal="true" aria-label="Ajustes" onclick="if(event.target===this)closeSettings()">
      <div class="settings-sheet">
        <h3>Ajustes</h3>
        <div class="theme-toggle-row">
          <span>Modo claro</span>
          <label class="theme-switch">
            <input type="checkbox" id="themeToggle" onchange="toggleTheme(this.checked)">
            <span class="theme-slider"></span>
          </label>
        </div>
      </div>
    </div>

    <script src="firebase-config.js"></script>
    <script src="demo-data.js"></script>
    <script src="app.js"></script>
    <script>
      let allPackages = [];
      let allProducts = [];
      let currentImageData = "";

      // ---- Tab Switching ----
      function switchTab(tab) {
        document.querySelectorAll(".tab-content").forEach(el => el.classList.add("hidden"));
        document.getElementById(`tab-${tab}`).classList.remove("hidden");

        // Sync desktop tabs
        const tabMap = { packages: 0, catalog: 1, clients: 2 };
        const btns = document.querySelectorAll(".tab-btn");
        btns.forEach(b => b.classList.remove("active"));
        if (btns[tabMap[tab]]) btns[tabMap[tab]].classList.add("active");

        // Sync bottom nav active state
        syncBottomNav(tab);

        if (tab === "catalog") loadProducts();
        if (tab === "clients") loadClients();
      }

      function switchTabBottom(tab, el) {
        switchTab(tab);
      }

      function syncBottomNav(tab) {
        const tabMap = { packages: 0, catalog: 1, clients: 2 };
        const items = document.querySelectorAll("#adminBottomNav .bottom-nav-item");
        items.forEach(i => i.classList.remove("active"));
        if (items[tabMap[tab]]) items[tabMap[tab]].classList.add("active");
        closeSettings();
      }

      // ---- FAB ----
      let currentTab = "packages";
      function fabAdd() {
        if (currentTab === "packages") showAddPackageForm();
        else if (currentTab === "catalog") showAddProductForm();
        else if (currentTab === "clients") showAddClientForm();
        window.scrollTo({ top: 0, behavior: "smooth" });
      }

      // Track current tab for FAB
      const _origSwitchTab = switchTab;
      switchTab = function(tab) {
        currentTab = tab;
        _origSwitchTab(tab);
      };
      const _origSwitchTabBottom = switchTabBottom;
      switchTabBottom = function(tab, el) {
        currentTab = tab;
        _origSwitchTabBottom(tab, el);
      };

      // ---- Theme ----
      function isLightMode() {
        return document.documentElement.getAttribute("data-theme") === "light";
      }
      function initTheme() {
        const saved = localStorage.getItem("rastreo_theme");
        if (saved === "light") {
          document.documentElement.setAttribute("data-theme", "light");
          const tog = document.getElementById("themeToggle");
          if (tog) tog.checked = true;
        }
        updateThemeIcon();
      }
      function applyTheme(light) {
        if (light) {
          document.documentElement.setAttribute("data-theme", "light");
          localStorage.setItem("rastreo_theme", "light");
        } else {
          document.documentElement.removeAttribute("data-theme");
          localStorage.setItem("rastreo_theme", "dark");
        }
        updateThemeIcon();
      }
      function toggleThemeDesktop() {
        const goLight = !isLightMode();
        applyTheme(goLight);
        const tog = document.getElementById("themeToggle");
        if (tog) tog.checked = goLight;
      }
      function updateThemeIcon() {
        const icon = document.getElementById("navThemeIcon");
        if (!icon) return;
        if (isLightMode()) {
          icon.innerHTML = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        } else {
          icon.innerHTML = '<path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/>';
        }
      }
      function toggleTheme(isLight) { applyTheme(isLight); }
      function toggleSettings() {
        const modal = document.getElementById("settingsModal");
        const item = document.getElementById("adminSettingsNavItem");
        const items = document.querySelectorAll("#adminBottomNav .bottom-nav-item");
        if (modal.classList.contains("hidden")) {
          // Deactivate all other bottom nav items, activate settings
          items.forEach(i => { if (i !== item) i.classList.remove("active"); });
          modal.classList.remove("hidden");
          item.classList.add("active");
        } else {
          modal.classList.add("hidden");
          item.classList.remove("active");
          // Re-activate the current tab
          syncBottomNav(currentTab);
        }
      }
      function closeSettings() {
        const modal = document.getElementById("settingsModal");
        if (!modal) return;
        modal.classList.add("hidden");
        const item = document.getElementById("adminSettingsNavItem");
        if (item) item.classList.remove("active");
      }
      document.addEventListener("keydown", (e) => {
        if (e.key === "Escape") {
          closeSettings();
          closeModal();
        }
      });
      initTheme();

      // ---- Auth ----
      function logout() {
        App.logout();
        window.location.href = "index.html";
      }

      async function showAdmin() {
        document.getElementById("adminSection").classList.remove("hidden");
        document.getElementById("adminNav").classList.remove("hidden");
        const user = App.getUser();
        if (user) document.getElementById("navUser").textContent = user.name + " (Admin)";
        populateStatusDropdowns();
        await loadPackages();
      }

      // ---- Packages ----
      function populateStatusDropdowns() {
        const selects = [document.getElementById("pkgStatus"), document.getElementById("bulkStatus")];
        selects.forEach(sel => {
          sel.innerHTML = App.STAGES.map(s => `<option value="${s}">${s}</option>`).join("");
        });
      }

      async function loadPackages() {
        allPackages = await App.getAllPackages();
        renderPackageCards(allPackages);
      }

      function filterPackages() {
        const q = document.getElementById("adminSearch").value.toLowerCase().trim();
        if (!q) return renderPackageCards(allPackages);
        const filtered = allPackages.filter(
          p =>
            p.clientId.toLowerCase().includes(q) ||
            p.trackingNumber.toLowerCase().includes(q) ||
            p.clientName.toLowerCase().includes(q)
        );
        renderPackageCards(filtered);
      }

      function formatDate(isoString) {
        if (!isoString) return "—";
        const d = new Date(isoString);
        return d.toLocaleDateString("es-CR", { day: "2-digit", month: "short", year: "numeric" })
          + " " + d.toLocaleTimeString("es-CR", { hour: "2-digit", minute: "2-digit" });
      }

      function renderPackageCards(packages) {
        const container = document.getElementById("packageCards");
        if (packages.length === 0) {
          container.innerHTML = '<p class="no-results">No hay paquetes</p>';
          return;
        }
        container.innerHTML = packages.map(pkg => `
          <div class="admin-card-item">
            <div class="admin-card-header">
              <label class="admin-card-check">
                <input type="checkbox" class="pkg-check" value="${pkg.id}" onchange="updateBulkCount()" />
              </label>
              <div class="admin-card-header-info">
                <div class="admin-card-title">
                  ${pkg.trackingNumber}
                  <button class="btn-copy" onclick="copyTracking('${pkg.trackingNumber}', this)" title="Copiar" aria-label="Copiar número de rastreo"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
                </div>
                <div class="admin-card-subtitle">${pkg.clientName} · ${pkg.clientId}</div>
              </div>
              <div class="admin-card-actions">
                <button onclick="editPackage('${pkg.id}')" class="btn-icon btn-sm" title="Editar" aria-label="Editar paquete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button onclick="deletePackage('${pkg.id}')" class="btn-icon btn-sm btn-danger" title="Eliminar" aria-label="Eliminar paquete"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
              </div>
            </div>
            <div class="admin-card-body">
              <div class="admin-card-row"><span class="admin-card-label">Descripción</span><span class="admin-card-value">${pkg.description}</span></div>
              ${pkg.notes ? `<div class="admin-card-row"><span class="admin-card-label">Notas</span><span class="admin-card-value">${pkg.notes}</span></div>` : ""}
            </div>
            <div class="admin-card-footer">
              <span class="status-badge status-${App.STAGES.indexOf(pkg.status)}">${pkg.status}</span>
              <span class="date-cell">${formatDate(pkg.statusUpdatedAt)}</span>
            </div>
          </div>
        `).join("");
      }

      function showAddPackageForm() {
        document.getElementById("pkgFormTitle").textContent = "Nuevo paquete";
        document.getElementById("pkgEditId").value = "";
        document.getElementById("clientName").value = "";
        document.getElementById("clientId").value = "";
        document.getElementById("pkgDescription").value = "";
        document.getElementById("pkgStatus").value = App.STAGES[0];
        document.getElementById("pkgNotes").value = "";
        document.getElementById("pkgSaveBtn").disabled = true;
        document.getElementById("packageForm").classList.remove("hidden");
        document.getElementById("packageCards").classList.add("hidden");
        document.querySelector("#tab-packages .admin-toolbar").classList.add("hidden");
      }

      function hidePackageForm() {
        document.getElementById("packageForm").classList.add("hidden");
        document.getElementById("packageCards").classList.remove("hidden");
        document.querySelector("#tab-packages .admin-toolbar").classList.remove("hidden");
      }

      function checkPkgFields() {
        const ok = document.getElementById("clientName").value.trim()
          && document.getElementById("clientId").value.trim()
          && document.getElementById("pkgDescription").value.trim();
        document.getElementById("pkgSaveBtn").disabled = !ok;
      }

      async function savePackage() {
        const editId = document.getElementById("pkgEditId").value;
        const data = {
          clientName: document.getElementById("clientName").value.trim(),
          clientId: document.getElementById("clientId").value.trim(),
          description: document.getElementById("pkgDescription").value.trim(),

          await App.updatePackage(editId, data);
        } else {
          await App.addPackage(data);
        }

        hidePackageForm();
        await loadPackages();
      }

      function editPackage(id) {

        document.getElementById("pkgFormTitle").textContent = "Editar paquete";
        document.getElementById("pkgEditId").value = pkg.id;
        document.getElementById("clientName").value = pkg.clientName;
        document.getElementById("clientId").value = pkg.clientId;
        document.getElementById("pkgDescription").value = pkg.description;
        document.getElementById("pkgStatus").value = pkg.status;

        document.getElementById("packageCards").classList.add("hidden");

      }

      function deletePackage(id) {
        showModal("¿Estás segura de que querés eliminar este paquete?", async () => {
          await App.deletePackage(id);
          await loadPackages();
        });
      }

      function toggleSelectAll() {
        const checked = document.getElementById("selectAll").checked;
        document.querySelectorAll(".pkg-check").forEach(cb => (cb.checked = checked));
        updateBulkCount();
      }

      function updateBulkCount() {
        const selected = document.querySelectorAll(".pkg-check:checked");
        const section = document.getElementById("bulkSection");
        document.getElementById("bulkCount").textContent = `${selected.length} seleccionados`;
        if (selected.length > 0) {
          section.classList.remove("hidden");
        } else {
          section.classList.add("hidden");
        }
      }

      async function bulkUpdate() {
        const selected = [...document.querySelectorAll(".pkg-check:checked")].map(cb => cb.value);
        const newStatus = document.getElementById("bulkStatus").value;
        for (const id of selected) {
          await App.updatePackage(id, { status: newStatus });
        }
        cancelBulk();
        await loadPackages();
      }

      function cancelBulk() {
        document.getElementById("selectAll").checked = false;
        document.querySelectorAll(".pkg-check").forEach(cb => (cb.checked = false));
        document.getElementById("bulkSection").classList.add("hidden");
      }

      // ---- Catalog / Products ----
      async function loadProducts() {
        allProducts = await App.getAllProducts();
        renderProductCards(allProducts);
      }

      function filterProducts() {
        const q = document.getElementById("catalogAdminSearch").value.toLowerCase().trim();
        if (!q) return renderProductCards(allProducts);
        const filtered = allProducts.filter(
          p => p.name.toLowerCase().includes(q) ||
            (p.productCode && p.productCode.toLowerCase().includes(q)) ||
            (p.notes && p.notes.toLowerCase().includes(q))
        );
        renderProductCards(filtered);
      }

      function renderProductCards(products) {
        const container = document.getElementById("productCards");
        if (products.length === 0) {
          container.innerHTML = '<p class="no-results">No hay productos</p>';
          return;
        }
        container.innerHTML = products.map(p => {
          const priceStr = p.price ? (p.currency === "USD" ? "$" : "₡") + Number(p.price).toLocaleString("es-CR") : "—";
          return `
          <div class="admin-card-item">
            <div class="admin-card-header">
              <div class="admin-card-header-info">
                <div class="admin-card-title">${p.name}</div>
                <div class="admin-card-subtitle">${p.productCode || ""}</div>
              </div>
              <div class="admin-card-actions">
                ${p.productCode ? `<button class="btn-copy" onclick="event.stopPropagation();copyTracking('${p.productCode}', this)" title="Copiar código" aria-label="Copiar código de producto"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>` : ""}
                <button onclick="editProduct('${p.id}')" class="btn-icon btn-sm" title="Editar" aria-label="Editar producto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button onclick="deleteProduct('${p.id}')" class="btn-icon btn-sm btn-danger" title="Eliminar" aria-label="Eliminar producto"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
              </div>
            </div>
            <div class="admin-card-body">
              <div class="admin-card-row"><span class="admin-card-label">Precio</span><span class="admin-card-value admin-card-price">${priceStr}</span></div>
              ${p.location ? `<div class="admin-card-row"><span class="admin-card-label">Bodega</span><span class="admin-card-value">${p.location}</span></div>` : ""}
              ${p.notes ? `<div class="admin-card-row"><span class="admin-card-label">Notas</span><span class="admin-card-value">${p.notes}</span></div>` : ""}
            </div>
          </div>`;
        }).join("");
      }

      function showAddProductForm() {
        document.getElementById("prodFormTitle").textContent = "Nuevo producto";
        document.getElementById("prodEditId").value = "";
        document.getElementById("prodName").value = "";
        document.getElementById("prodPrice").value = "";
        document.getElementById("prodLocation").value = "";
        document.getElementById("prodNotes").value = "";
        document.getElementById("prodImage").value = "";
        currentImageData = "";
        document.getElementById("prodSaveBtn").disabled = true;
        document.getElementById("imagePreview").classList.add("hidden");
        document.getElementById("productForm").classList.remove("hidden");
        document.getElementById("productCards").classList.add("hidden");
        document.querySelector("#tab-catalog .admin-toolbar").classList.add("hidden");
      }

      function hideProductForm() {
        document.getElementById("productForm").classList.add("hidden");
        document.getElementById("productCards").classList.remove("hidden");
        document.querySelector("#tab-catalog .admin-toolbar").classList.remove("hidden");
      }

      function previewImage(e) {
        const file = e.target.files[0];
        if (!file) return;

        // Resize to keep localStorage manageable
        const reader = new FileReader();
        reader.onload = function (evt) {
          const img = new Image();
          img.onload = function () {
            const canvas = document.createElement("canvas");
            const MAX = 400;
            let w = img.width;
            let h = img.height;
            if (w > h) { h = h * (MAX / w); w = MAX; }
            else { w = w * (MAX / h); h = MAX; }
            canvas.width = w;
            canvas.height = h;
            canvas.getContext("2d").drawImage(img, 0, 0, w, h);
            currentImageData = canvas.toDataURL("image/jpeg", 0.7);
            document.getElementById("previewImg").src = currentImageData;
            document.getElementById("imagePreview").classList.remove("hidden");
          };
          img.src = evt.target.result;
        };
        reader.readAsDataURL(file);
      }

      function clearImage() {
        currentImageData = "";
        document.getElementById("prodImage").value = "";
        document.getElementById("imagePreview").classList.add("hidden");
      }

      function checkProdFields() {
        const ok = document.getElementById("prodName").value.trim()
          && document.getElementById("prodPrice").value
          && document.getElementById("prodLocation").value;
        document.getElementById("prodSaveBtn").disabled = !ok;
      }

      async function saveProduct() {
        const editId = document.getElementById("prodEditId").value;
        const data = {
          name: document.getElementById("prodName").value.trim(),
          price: document.getElementById("prodPrice").value,
          currency: document.getElementById("prodCurrency").value,
          location: document.getElementById("prodLocation").value,
          notes: document.getElementById("prodNotes").value.trim(),
        };

        if (currentImageData) {
          data.image = currentImageData;
        } else if (!editId) {
          data.image = "";
        }

        if (editId) {
          await App.updateProduct(editId, data);
        } else {
          await App.addProduct(data);
        }

        hideProductForm();
        await loadProducts();
      }

      function editProduct(id) {
        const p = allProducts.find(x => x.id === id);
        if (!p) return;
        document.getElementById("prodFormTitle").textContent = "Editar producto";
        document.getElementById("prodEditId").value = p.id;
        document.getElementById("prodName").value = p.name;
        document.getElementById("prodCurrency").value = p.currency || "CRC";
        document.getElementById("prodPrice").value = p.price || "";
        document.getElementById("prodLocation").value = p.location || "";
        document.getElementById("prodNotes").value = p.notes || "";
        document.getElementById("prodImage").value = "";
        currentImageData = p.image || "";
        if (p.image) {
          document.getElementById("previewImg").src = p.image;
          document.getElementById("imagePreview").classList.remove("hidden");
        } else {
          document.getElementById("imagePreview").classList.add("hidden");
        }
        document.getElementById("prodSaveBtn").disabled = true;
        document.getElementById("productForm").classList.remove("hidden");
        document.getElementById("productCards").classList.add("hidden");
        document.querySelector("#tab-catalog .admin-toolbar").classList.add("hidden");
      }

      function deleteProduct(id) {
        showModal("¿Estás segura de que querés eliminar este producto?", async () => {
          await App.deleteProduct(id);
          await loadProducts();
        });
      }

      // ---- Clients ----
      let allClients = [];

      async function loadClients() {
        allClients = await App.getAllClients();
        renderClientCards(allClients);
      }

      function filterClients() {
        const q = document.getElementById("clientAdminSearch").value.toLowerCase().trim();
        if (!q) return renderClientCards(allClients);
        const filtered = allClients.filter(
          c =>
            c.name.toLowerCase().includes(q) ||
            c.cedula.toLowerCase().includes(q) ||
            (c.phone && c.phone.toLowerCase().includes(q))
        );
        renderClientCards(filtered);
      }

      function renderClientCards(clients) {
        const container = document.getElementById("clientCards");
        if (clients.length === 0) {
          container.innerHTML = '<p class="no-results">No hay clientes</p>';
          return;
        }
        container.innerHTML = clients.map(c => `
          <div class="admin-card-item">
            <div class="admin-card-header">
              <div class="admin-card-header-info">
                <div class="admin-card-title">${c.name}</div>
                <div class="admin-card-subtitle">
                  ${c.cedula}
                  <button class="btn-copy" onclick="copyTracking('${c.cedula}', this)" title="Copiar cédula" aria-label="Copiar cédula"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg></button>
                </div>
              </div>
              <div class="admin-card-actions">
                <button onclick="editClient('${c.id}')" class="btn-icon btn-sm" title="Editar" aria-label="Editar cliente"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg></button>
                <button onclick="deleteClient('${c.id}')" class="btn-icon btn-sm btn-danger" title="Eliminar" aria-label="Eliminar cliente"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2"/></svg></button>
              </div>
            </div>
            <div class="admin-card-body">
              ${c.phone ? `<div class="admin-card-row"><span class="admin-card-label">Teléfono</span><span class="admin-card-value">${c.phone}</span></div>` : ""}
              ${c.email ? `<div class="admin-card-row"><span class="admin-card-label">Correo</span><span class="admin-card-value">${c.email}</span></div>` : ""}
              ${c.address ? `<div class="admin-card-row"><span class="admin-card-label">Dirección</span><span class="admin-card-value">${c.address}</span></div>` : ""}
              ${c.notes ? `<div class="admin-card-row"><span class="admin-card-label">Notas</span><span class="admin-card-value">${c.notes}</span></div>` : ""}
            </div>
          </div>
        `).join("");
      }

      function showAddClientForm() {
        document.getElementById("clientFormTitle").textContent = "Nuevo cliente";
        document.getElementById("clientEditId").value = "";
        document.getElementById("cliName").value = "";
        document.getElementById("cliCedula").value = "";
        document.getElementById("cliPhone").value = "";
        document.getElementById("cliEmail").value = "";
        document.getElementById("cliAddress").value = "";
        document.getElementById("cliNotes").value = "";
        document.getElementById("clientSaveBtn").disabled = true;
        document.getElementById("clientForm").classList.remove("hidden");
        document.getElementById("clientCards").classList.add("hidden");
        document.querySelector("#tab-clients .admin-toolbar").classList.add("hidden");
      }

      function hideClientForm() {
        document.getElementById("clientForm").classList.add("hidden");
        document.getElementById("clientCards").classList.remove("hidden");
        document.querySelector("#tab-clients .admin-toolbar").classList.remove("hidden");
      }

      function checkClientFields() {
        const ok = document.getElementById("cliName").value.trim()
          && document.getElementById("cliCedula").value.trim()
          && document.getElementById("cliPhone").value.trim();
        document.getElementById("clientSaveBtn").disabled = !ok;
      }

      async function saveClient() {
        const editId = document.getElementById("clientEditId").value;
        const data = {
          name: document.getElementById("cliName").value.trim(),
          cedula: document.getElementById("cliCedula").value.trim(),
          phone: document.getElementById("cliPhone").value.trim(),
          email: document.getElementById("cliEmail").value.trim(),
          address: document.getElementById("cliAddress").value.trim(),
          notes: document.getElementById("cliNotes").value.trim(),
        };

        if (editId) {
          await App.updateClient(editId, data);
        } else {
          await App.addClient(data);
        }

        hideClientForm();
        await loadClients();
      }

      function editClient(id) {
        const c = allClients.find(x => x.id === id);
        if (!c) return;
        document.getElementById("clientFormTitle").textContent = "Editar cliente";
        document.getElementById("clientEditId").value = c.id;
        document.getElementById("cliName").value = c.name;
        document.getElementById("cliCedula").value = c.cedula;
        document.getElementById("cliPhone").value = c.phone || "";
        document.getElementById("cliEmail").value = c.email || "";
        document.getElementById("cliAddress").value = c.address || "";
        document.getElementById("cliNotes").value = c.notes || "";
        document.getElementById("clientSaveBtn").disabled = true;
        document.getElementById("clientForm").classList.remove("hidden");
        document.getElementById("clientCards").classList.add("hidden");
        document.querySelector("#tab-clients .admin-toolbar").classList.add("hidden");
      }

      function deleteClient(id) {
        showModal("¿Estás segura de que querés eliminar este cliente?", async () => {
          await App.deleteClient(id);
          await loadClients();
        });
      }

      // ---- Copy Tracking ----
      function copyTracking(text, btn) {
        navigator.clipboard.writeText(text).then(() => {
          btn.classList.add("copied");
          btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg>';
          setTimeout(() => {
            btn.classList.remove("copied");
            btn.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>';
          }, 1500);
        });
      }

      // ---- Confirm Modal ----
      let modalCallback = null;

      function showModal(msg, onConfirm) {
        document.getElementById("confirmMsg").textContent = msg;
        document.getElementById("confirmModal").classList.remove("hidden");
        modalCallback = onConfirm;
        document.getElementById("confirmYes").onclick = async () => {
          closeModal();
          if (modalCallback) await modalCallback();
          modalCallback = null;
        };
      }

      function closeModal() {
        document.getElementById("confirmModal").classList.add("hidden");
        modalCallback = null;
      }

      // ---- Init: only logged-in admins can access this page ----
      if (App.isLoggedIn()) {
        const user = App.getUser();
        if (user && user.role === "admin") {
          showAdmin();
        } else {
          window.location.href = "index.html";
        }
      } else {
        window.location.href = "index.html";
      }

    </script>
  </body>
